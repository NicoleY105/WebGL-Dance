<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VR Dance Demo – Final</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;color:#ddd;font-family:'Courier New',monospace;overflow:hidden;user-select:none}
#c{display:block;position:fixed;inset:0;width:100%;height:100%}

/* ── Panel ── */
#panel{
  position:fixed;top:14px;left:14px;width:290px;
  background:rgba(8,8,16,0.88);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;padding:16px 18px;
  backdrop-filter:blur(12px);
  font-size:12px;line-height:1.55;
  z-index:10;
}
#panel h1{font-size:14px;font-weight:700;letter-spacing:.1em;color:#fff;margin-bottom:3px}
.subtitle{font-size:10px;color:#555;margin-bottom:12px;letter-spacing:.05em}

/* tabs */
.tabs{display:flex;gap:4px;margin-bottom:12px}
.tab{flex:1;padding:5px 0;border-radius:6px;cursor:pointer;text-align:center;
  font-size:11px;font-family:'Courier New',monospace;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
  color:#666;transition:all .15s}
.tab.on{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2);color:#eee}

/* controls */
.row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
kbd{font-family:'Courier New',monospace;background:rgba(255,255,255,0.09);
  border:1px solid rgba(255,255,255,0.15);border-radius:4px;
  padding:1px 6px;font-size:11px;color:#ccc}
.hint{color:#555;font-size:11px}
hr.sep{border:none;border-top:1px solid rgba(255,255,255,0.06);margin:10px 0}

/* BPM display */
#bpm-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
#bpm-val{font-size:22px;font-weight:700;color:#fff;min-width:48px}
#bpm-label{font-size:10px;color:#555}
#beat-dot{width:10px;height:10px;border-radius:50%;background:#222;
  transition:background .05s,box-shadow .05s;flex-shrink:0}
#beat-dot.on{background:#7DF9AA;box-shadow:0 0 8px #7DF9AA}

/* beat bar */
#beat-bar-wrap{height:28px;position:relative;overflow:hidden;border-radius:4px;
  background:rgba(255,255,255,0.04);margin-bottom:8px}
#beat-bar{height:100%;width:0%;
  background:linear-gradient(90deg,#1a3a2a,#4eff99);
  transition:width .04s linear}

/* spectrum */
#spec-wrap{height:36px;margin-bottom:10px}
canvas#spec{width:100%;height:100%;border-radius:4px;display:block}

/* status */
#status{font-size:11px;color:#555;min-height:16px}
#status b{color:#7DF9AA}

/* GLB drop zone */
#drop-zone{
  border:1px solid rgba(255,255,255,0.08);border-radius:8px;
  padding:10px;margin-top:10px;
}

/* playback slider */
.slider-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.slider-row label{font-size:10px;color:#555;min-width:26px}
input[type=range]{flex:1;accent-color:#7DF9AA;height:3px}
.slider-row span{font-size:11px;color:#888;min-width:32px;text-align:right}

/* ══ MUSIC UPLOAD PANEL ═══════════════════════════════════════════════════ */
#music-panel{
  position:fixed;top:14px;right:14px;width:320px;
  background:rgba(8,8,16,0.93);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;padding:16px 18px 18px;
  backdrop-filter:blur(14px);
  font-size:12px;line-height:1.55;z-index:10;
}
#music-panel h2{font-size:13px;font-weight:700;letter-spacing:.08em;color:#fff;margin-bottom:2px}
#music-panel .mp-sub{font-size:10px;color:#444;margin-bottom:14px}
#audio-drop{
  border:2px dashed rgba(255,255,255,0.1);border-radius:10px;
  padding:20px 12px;text-align:center;cursor:pointer;
  transition:all .2s;margin-bottom:12px;
  background:rgba(255,255,255,0.02);
}
#audio-drop:hover,#audio-drop.drag-over{
  border-color:rgba(125,249,170,0.4);background:rgba(125,249,170,0.04);
}
#audio-drop .drop-icon{font-size:28px;margin-bottom:6px;display:block}
#audio-drop .drop-text{font-size:12px;color:#666}
#audio-drop .drop-hint{font-size:10px;color:#333;margin-top:4px}
#track-info{display:none;margin-bottom:12px}
#track-info.visible{display:block}
#track-name{font-size:13px;font-weight:600;color:#eee;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#track-sub{font-size:10px;color:#555;margin-bottom:10px}
#bpm-display{
  display:flex;align-items:center;gap:12px;
  background:rgba(125,249,170,0.06);border:1px solid rgba(125,249,170,0.15);
  border-radius:8px;padding:10px 14px;margin-bottom:10px;
}
#bpm-big{font-size:32px;font-weight:700;color:#7DF9AA;line-height:1}
#bpm-right{flex:1}
#bpm-label-mp{font-size:10px;color:#3a7a55;margin-bottom:2px}
#bpm-confidence{font-size:10px;color:#555}
#beat-dot-mp{width:10px;height:10px;border-radius:50%;background:#1a3a2a;
  flex-shrink:0;transition:background .05s,box-shadow .05s}
#beat-dot-mp.on{background:#7DF9AA;box-shadow:0 0 8px #7DF9AA}
#waveform-wrap{height:48px;border-radius:6px;overflow:hidden;
  background:rgba(255,255,255,0.03);margin-bottom:8px;
  position:relative;cursor:pointer}
canvas#waveform{width:100%;height:100%;display:block}
#progress-bar{position:absolute;top:0;left:0;height:100%;width:0%;
  background:rgba(125,249,170,0.12);pointer-events:none}
#transport{display:flex;gap:6px;margin-bottom:10px}
#btn-play-audio{
  flex:1;padding:8px 0;border-radius:7px;cursor:pointer;
  background:rgba(125,249,170,0.12);border:1px solid rgba(125,249,170,0.25);
  color:#7DF9AA;font-family:'Courier New',monospace;font-size:12px;transition:all .15s;
}
#btn-play-audio:hover{background:rgba(125,249,170,0.22)}
#btn-play-audio:disabled{opacity:0.25;cursor:not-allowed}
#btn-sync-mp{
  flex:1;padding:8px 0;border-radius:7px;cursor:pointer;
  background:rgba(255,165,0,0.12);border:1px solid rgba(255,165,0,0.28);
  color:#FFA500;font-family:'Courier New',monospace;font-size:12px;transition:all .15s;
}
#btn-sync-mp:hover:not(:disabled){background:rgba(255,165,0,0.22)}
#btn-sync-mp:disabled{opacity:0.25;cursor:not-allowed}
#bpm-row-mp{display:flex;align-items:center;gap:7px;margin-bottom:6px}
#bpm-row-mp label{font-size:10px;color:#444;flex-shrink:0}
#bpm-manual{
  width:64px;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.09);border-radius:5px;
  padding:4px 6px;color:#aaa;font-family:'Courier New',monospace;
  font-size:13px;outline:none;text-align:center;
}
#bpm-apply{
  padding:4px 10px;border-radius:5px;cursor:pointer;
  background:rgba(125,249,170,0.1);border:1px solid rgba(125,249,170,0.2);
  color:#7DF9AA;font-family:'Courier New',monospace;font-size:11px;
}
.tunebat-link{font-size:10px;color:#333;text-decoration:none;margin-left:auto}
.tunebat-link:hover{color:#666}
#analyse-bar{height:3px;border-radius:2px;background:rgba(255,255,255,0.05);
  margin-bottom:10px;overflow:hidden;display:none}
#analyse-bar.visible{display:block}
#analyse-fill{height:100%;width:0%;background:#7DF9AA;transition:width .1s}
#music-status{font-size:10px;color:#444;text-align:center;min-height:14px}
#music-status b{color:#7DF9AA}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="panel">
  <h1>ANIMATED DANCE SHOW</h1>
  <div class="subtitle">three.js · GLB Humanoid · Web Audio Beat Sync</div>

  <div class="tabs">
    <div class="tab on" id="tab-box"  onclick="setMode('box')">方塊人</div>
    <div class="tab"    id="tab-glb"  onclick="setMode('glb')">GLB 模型</div>
  </div>

  <div id="bpm-row">
    <div id="beat-dot"></div>
    <div>
      <div id="bpm-val">128</div>
      <div id="bpm-label">BPM</div>
    </div>
    <div style="flex:1"></div>
    <div style="text-align:right">
      <div style="font-size:10px;color:#555">節拍偵測</div>
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;justify-content:flex-end">
        <input type="checkbox" id="chk-beat" checked style="accent-color:#7DF9AA"/>
        <span style="font-size:11px;color:#888">Audio Sync</span>
      </label>
    </div>
  </div>

  <div id="beat-bar-wrap"><div id="beat-bar"></div></div>
  <canvas id="spec" height="36"></canvas>

  <hr class="sep"/>

  <div class="slider-row">
    <label>速度</label>
    <input type="range" id="sl-speed" min="50" max="200" value="100"
           oninput="setSpeed(this.value)"/>
    <span id="speed-val">100%</span>
  </div>
  <div class="slider-row">
    <label>音量</label>
    <input type="range" id="sl-vol" min="0" max="100" value="70"
           oninput="setVolume(this.value)"/>
    <span id="vol-val">70%</span>
  </div>

  <hr class="sep"/>

  <div class="row"><kbd>Space</kbd><span class="hint">播放 / 暫停</span></div>
  <div class="row"><span class="hint">🖱 左鍵拖移旋轉視角</span></div>
  <div class="row"><span class="hint">🖱 滾輪縮放 · 右鍵平移</span></div>

  <div id="drop-zone">
    <div style="color:#666;font-size:11px;margin-bottom:8px">載入 GLB 模型</div>

    <!-- 方案A：直接選檔案（file:// 也可用）-->
    <div style="display:flex;gap:5px;margin-bottom:5px">
      <button onclick="pickGLB('M')"
        style="flex:1;padding:5px 0;border-radius:5px;cursor:pointer;
               background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
               color:#bbb;font-family:'Courier New',monospace;font-size:11px">
        選男模型
      </button>
      <button onclick="pickGLB('F')"
        style="flex:1;padding:5px 0;border-radius:5px;cursor:pointer;
               background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
               color:#bbb;font-family:'Courier New',monospace;font-size:11px">
        選女模型
      </button>
    </div>

    <!-- 方案B：路徑輸入（本地伺服器時用）-->
    <div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:8px;margin-top:4px">
      <div style="color:#444;font-size:10px;margin-bottom:5px">或輸入路徑（需本地伺服器）</div>
      <div style="display:flex;gap:5px;align-items:center;margin-bottom:4px">
        <span style="color:#555;font-size:10px;min-width:16px">男</span>
        <input id="path-m" type="text" value="models/nick_wilde_zootopia.glb"
          style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
                 border-radius:4px;padding:2px 6px;color:#999;font-family:'Courier New',monospace;
                 font-size:10px;outline:none"/>
      </div>
      <div style="display:flex;gap:5px;align-items:center;margin-bottom:6px">
        <span style="color:#555;font-size:10px;min-width:16px">女</span>
        <input id="path-f" type="text" value="models/judy_hopps_police_outfit.glb"
          style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
                 border-radius:4px;padding:2px 6px;color:#999;font-family:'Courier New',monospace;
                 font-size:10px;outline:none"/>
      </div>
      <button onclick="loadGLBFromPaths()"
        style="width:100%;padding:4px 0;border-radius:5px;cursor:pointer;
               background:rgba(125,249,170,0.10);border:1px solid rgba(125,249,170,0.2);
               color:#7DF9AA;font-family:'Courier New',monospace;font-size:11px">
        從路徑載入
      </button>
    </div>
  </div>

  <div id="status">載入中…</div>
</div>

}

let _stageHueOffset = 0; // incremented each beat

function pulseStageLights() {
  _stageHueOffset = (_stageHueOffset + 25) % 360; // shift 25° each beat
  stageLights.forEach((l, i) => {
    const hue = (_stageHues[i] + _stageHueOffset) % 360;
    l.color.setHSL(hue / 360, 1.0, 0.55);
    l.intensity = 2.8;
    setTimeout(() => l.intensity = 1.3, 80 + i * 15);
  });
}

(function buildRoom() {
  const addMesh = (geo, mat, x, y, z, shadow) => {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, y, z);
    if (shadow) { m.castShadow = true; m.receiveShadow = true; }
    scene.add(m); return m;
  };
  // Floor tiles
  const floorMat = new THREE.MeshPhongMaterial({color:0x0a0800, shininess:120, specular:0x222200});
  addMesh(new THREE.BoxGeometry(44,0.4,44), floorMat, 0,-0.2,0, true);
  // Outer rim
  addMesh(new THREE.BoxGeometry(50,2,50),
    new THREE.MeshPhongMaterial({color:0x1a0025, shininess:20}), 0,-1.2,0, true);
  // Pillars
  const pilMat = new THREE.MeshPhongMaterial({color:0x887700, shininess:80, specular:0x444400});
  [[23.5,7,23.5],[-23.5,7,23.5],[23.5,7,-23.5],[-23.5,7,-23.5]].forEach(p => {
    addMesh(new THREE.BoxGeometry(3,20,3), pilMat, ...p, true);
  });
  // Ceiling grid lines
  const lineMat = new THREE.LineBasicMaterial({color:0x222233, transparent:true, opacity:0.4});
  for (let i=-20; i<=20; i+=4) {
    const pts = [new THREE.Vector3(-24,22,i), new THREE.Vector3(24,22,i)];
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lineMat));
    const pts2 = [new THREE.Vector3(i,22,-24), new THREE.Vector3(i,22,24)];
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts2), lineMat));
  }
})();

function mat(hex, shi=40) { return new THREE.MeshPhongMaterial({color:hex, shininess:shi}); }

function buildBoxFigure(isFemale, baseX) {
  const skin=mat(0xFFC47A), black=mat(0x111111,60), white=mat(0xfafafa,50);
  const red=mat(0xcc2222,60), yellow=mat(0xddbb00,40);

  const root = new THREE.Group();
  root.position.set(baseX, isFemale ? 11.0 : 12.5, 0);
  
  function addStatic(geo, material, px, py, pz) {
    const m = new THREE.Mesh(geo, material);
    m.position.set(px, py, pz);
    m.castShadow = true; m.receiveShadow = true;
    root.add(m);
  }

  function createJoint(parent, w, h, d, material, px, py, pz, meshZOffset = 0) {
    const joint = new THREE.Group();
    joint.position.set(px, py, pz);
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
    mesh.position.set(0, -h / 2, meshZOffset);
    mesh.castShadow = true; mesh.receiveShadow = true;
    joint.add(mesh);
    parent.add(joint);
    return joint;
  }

  // 頭軀幹 (保持不變)
  if (isFemale) {
    addStatic(new THREE.SphereGeometry(1.0, 16, 12), skin, 0, 2.7, 0);
    addStatic(new THREE.BoxGeometry(3, 3, 2), white, 0, 0, 0);
    addStatic(new THREE.BoxGeometry(2.2, 2.625, 1.6), red, 0, -2.625, 0);
    addStatic(new THREE.BoxGeometry(2.625, 2.625, 1.8), red, 0, 0, 0);
    addStatic(new THREE.SphereGeometry(0.7, 16, 12), red, 0, -4.2, 0);
  } else {
    addStatic(new THREE.SphereGeometry(1.2, 16, 12), skin, 0, 3.5, 0);
    addStatic(new THREE.BoxGeometry(3, 3, 2), white, 0, 0, 0);
    addStatic(new THREE.BoxGeometry(3, 3, 2), black, 0, -3.0, 0);
  }

  // 手臂
  const rua = createJoint(root, isFemale?0.8:1.2, isFemale?2.625:3.0, isFemale?1.0:1.2, white, isFemale?-1.9:-2.1, isFemale?1.3:1.5, 0);
  const rda = createJoint(rua,  isFemale?0.7:1.0, isFemale?2.625:3.0, isFemale?0.9:1.0, skin,  0, isFemale?-2.625:-3.0, 0);
  const rHand = new THREE.Mesh(new THREE.SphereGeometry(isFemale?0.7:0.8, 16, 12), skin);
  rHand.position.set(0, isFemale?-2.625:-3.0, 0); rda.add(rHand);

  const lua = createJoint(root, isFemale?0.8:1.2, isFemale?2.625:3.0, isFemale?1.0:1.2, white, isFemale?1.9:2.1, isFemale?1.3:1.5, 0);
  const lda = createJoint(lua,  isFemale?0.7:1.0, isFemale?2.625:3.0, isFemale?0.9:1.0, skin,  0, isFemale?-2.625:-3.0, 0);
  const lHand = new THREE.Mesh(new THREE.SphereGeometry(isFemale?0.7:0.8, 16, 12), skin);
  lHand.position.set(0, isFemale?-2.625:-3.0, 0); lda.add(lHand);

  // ── 腿部 (修正了對稱性，確保 px 正負值相反)
  const legCol = isFemale ? skin : black;
  // 右腳 (-X)
  const rul = createJoint(root, isFemale?1.2:1.5, isFemale?3.0:3.5, isFemale?1.6:2.0, legCol, -0.8, isFemale?-4.0:-4.5, 0);
  const rdl = createJoint(rul,  isFemale?1.0:1.5, isFemale?3.0:3.5, isFemale?1.4:2.0, legCol, 0, isFemale?-3.0:-3.5, 0);
  const rf  = createJoint(rdl, isFemale?1.0:1.5, 1.0, isFemale?2.5:3.0, isFemale?yellow:black, 0, isFemale?-3.0:-3.5, 0, -0.5); 
  rf.name = "RightFoot_Unique"; // 給予唯一 ID

  // 左腳 (+X) 🌟 這裡修正了 px 為正值 0.8
  const lul = createJoint(root, isFemale?1.2:1.5, isFemale?3.0:3.5, isFemale?1.6:2.0, legCol, 0.8, isFemale?-4.0:-4.5, 0);
  const ldl = createJoint(lul,  isFemale?1.0:1.5, isFemale?3.0:3.5, isFemale?1.4:2.0, legCol, 0, isFemale?-3.0:-3.5, 0);
  const lf  = createJoint(ldl, isFemale?1.0:1.5, 1.0, isFemale?2.5:3.0, isFemale?yellow:black, 0, isFemale?-3.0:-3.5, 0, -0.5); 
  lf.name = "LeftFoot_Unique"; // 給予唯一 ID


  return { root, rua, rda, lua, lda, rul, rdl, rf, lul, ldl, lf };
}

// 保留你原本建立 Bone Map 的功能
function buildBoneMap(gltfScene) {
  const map = {};
  gltfScene.traverse(o => { if (o.isBone && o.name) map[o.name] = o; });
  gltfScene.traverse(o => { if (o.name && !map[o.name]) map[o.name] = o; });
  return map;
}

// 修正：強制只抓取正確關節，避免貪婪搜尋
function getBoneByKeyword(boneMap, keyword) {
    if (!keyword) return null;
    // 精準比對：骨頭名稱必須完全包含關鍵字，且排除結尾(end)節點
    const match = Object.keys(boneMap).find(k => 
        k.includes(keyword) && !k.toLowerCase().includes('end')
    );
    return match ? boneMap[match] : null;
}

// 修正：應用旋轉邏輯，保留防呆與初始姿態，確保模型不消失
function applyGLBAngles(model, boneMap, pfx) {
    if (!model || !boneMap) return;
    
    const currentDict = (pfx === 'M') ? BONE_MAP_M : BONE_MAP_F;
    const T = S[pfx+'BadyT'];
    const R = S[pfx+'BadyR'];
    if (!T || !R) return;

    // 1. 設定模型位置
    model.position.set((pfx==='M'?10:-10)+T[0], T[1], T[2]);

    // 2. 定義旋轉與賦值邏輯 (保留防呆與 initQ)
    function applyToBone(key, data, isSingleAxis) {
        const bone = getBoneByKeyword(boneMap, currentDict[key]);
        if (!bone || data === undefined) return; // 防呆：找不到骨頭直接跳過

        if (!bone.userData.initQ) bone.userData.initQ = bone.quaternion.clone();

        let euler;
        if (isSingleAxis) {
            // 腳掌通常只旋轉 X 軸，通常不需要針對腳掌做鏡像反轉
            euler = new THREE.Euler(-data * DEG, 0, 0, 'XYZ');
        } else {
            // 取得數據
            let rx = data[0], ry = data[1], rz = data[2];
            // 🌟 強制修正：針對身體核心進行方向反轉 (這能解決後仰問題)
            if (key === 'BadyR') {
            }

            euler = new THREE.Euler(-rx * DEG, ry * DEG, -rz * DEG, 'XYZ');
        }
        
        const q = new THREE.Quaternion().setFromEuler(euler);
        bone.quaternion.copy(bone.userData.initQ).multiply(q);
    }

// 2. 映射修正：根據性別 (pfx) 動態決定左右交換邏輯
    let map;
    if (pfx === 'M') {
        // 男生 (M)：手交換，腿也交換
        map = {
            'RUHand': 'LUHand', 'LUHand': 'RUHand',
            'RDHand': 'LDHand', 'LDHand': 'RDHand',
            'RULeg':  'LULeg',  'LULeg':  'RULeg', // 腿交換
            'RDLeg':  'LDLeg',  'LDLeg':  'RDLeg',
            'RBLeg':  'LBLeg',  'LBLeg':  'RBLeg'
        };
    } else {
        // 女生 (F)：手交換，腿不交換 (維持原對應)
        map = {
            'RUHand': 'LUHand', 'LUHand': 'RUHand',
            'RDHand': 'LDHand', 'LDHand': 'RDHand',
            'RULeg':  'RULeg',  'LULeg':  'LULeg', // 腿不換
            'RDLeg':  'RDLeg',  'LDLeg':  'LDLeg',
            'RBLeg':  'RBLeg',  'LBLeg':  'LBLeg'
        };
    }

    // 3. 執行映射
    applyToBone('BadyR', R, false); // 身體旋轉
    
    const parts = ['RUHand','RDHand','LUHand','LDHand','RULeg','RDLeg','LULeg','LDLeg'];
    parts.forEach(key => applyToBone(map[key] || key, S[pfx+key], false));
    
    ['RBLeg','LBLeg'].forEach(key => applyToBone(map[key] || key, S[pfx+key], true));
}

// SECTION 7 ─ GLB LOADER
// ═══════════════════════════════════════════════════════════════════════════
// 宣告放最前面，避免 loadGLBFromPaths 被 onclick 呼叫時 gltfLoader 還未初始化
var gltfLoader = new THREE.GLTFLoader();

const MODEL_AUDIO_MAP = {
  'icy': { src: 'music/ICY.wav', name: 'ITZY-ICY' }
};

function loadGLB(source, slot) {
  
  // slot = 'M' or 'F'
  status(`載入 ${slot==='M'?'男':'女'} GLB 模型…`);
  const url = (typeof source === 'string') ? source : URL.createObjectURL(source);
  gltfLoader.load(url, gltf => {
    if (typeof source !== 'string') URL.revokeObjectURL(url);
    const model = gltf.scene;
     
    // 判斷檔名是否帶有 'mmd'
    const sourceName = (typeof source === 'string') ? source.toLowerCase() : source.name.toLowerCase();
    const isMMD = sourceName.includes('mmd');

    // 1. 設定陰影
    model.traverse(c => { c.castShadow = true; c.receiveShadow = true; });
    
    // 2. 如果是 MMD 模型，執行專屬的材質球修正
    if (isMMD) {
        model.traverse((child) => {
            if (child.isMesh) {
                const materials = Array.isArray(child.material) ? child.material : [child.material];
                materials.forEach((mat) => {
                    mat.transparent = false;
                    mat.opacity = 1.0;
                    mat.alphaTest = 0;
                    mat.depthWrite = true;
                    mat.side = THREE.DoubleSide;
                    mat.needsUpdate = true;
                });
            }
        });
    }

    // 3. 根據 slot（男/女）進行縮放調整
    if (slot === 'F') {
        model.scale.setScalar(10);
        gltf.scene.rotation.y = Math.PI; // 女生模型預設旋轉180度，讓它面向鏡頭
    } else if (slot === 'M') {
        model.scale.setScalar(18);
        if (isMMD) {
            gltf.scene.rotation.y = Math.PI; // MMD 男生模型也旋轉180度，讓它面向鏡頭
        }
    } else {
        model.scale.setScalar(10); 
    }

    // 4. 自動偵測模型名稱並讀取相對應的歌曲路徑
    let matchedAudio = null;
    for (let key in MODEL_AUDIO_MAP) {
        if (sourceName.includes(key)) {
            matchedAudio = MODEL_AUDIO_MAP[key];
            break;
        }
    }

    if (matchedAudio) {
        status(`<b>GLB (${slot})</b> 載入完成 ✓ 正在自動讀取配樂：<b>${matchedAudio.name}</b>…`);
        fetchAndLoadAudioFromPath(matchedAudio.src, matchedAudio.name);
    } else {
        status(`<b>GLB (${slot})</b> 載入完成 ✓`);
    }

    // 5. 動畫處置分流
    if (isMMD && gltf.animations && gltf.animations.length > 0) {
        // 【分流 A】如果是 MMD 且自帶動畫：啟用 Mixer 播放它自己的舞蹈
        const mixer = new THREE.AnimationMixer(model);
        const currentAction = mixer.clipAction(gltf.animations[0]);
        
        currentAction.play();
        currentAction.paused = true; // 預設先定格，等待音樂播放
        currentAction.loop = THREE.LoopOnce; // 不循環，讓它自然停在最後一幀

        if (slot === 'M') {
            window.mixerM = mixer;
            danceActionM = currentAction;
        } else {
            window.mixerF = mixer;
            danceActionF = currentAction;
        }
        console.log(`${slot==='M'?'男':'女'}為 MMD 模式，將播放自帶動畫`);
    } else {
        // 【分流 B】如果是普通模型：清空可能殘留的 MMD Mixer，走原本的骨骼驅動
        if (slot === 'M') {
            window.mixerM = null;
            danceActionM = null;
        } else {
            window.mixerF = null;
            danceActionF = null;
        }
        console.log(`${slot==='M'?'男':'女'}為普通模式，將由原始骨骼對照表驅動`);
    }

    // 6. 骨骼對照表與場景更換舊模型
    if (slot === 'M') {
      if (S.glbM) scene.remove(S.glbM);
      S.glbM = model; 
      S.glbM.isMMD = isMMD; // 標記此模型是否為 MMD
      S.bonesM = buildBoneMap(model);
      console.log("🕵️ 男模型的骨頭有這些：", Object.keys(S.bonesM));
    } else {
      if (S.glbF) scene.remove(S.glbF);
      S.glbF = model; 
      S.glbF.isMMD = isMMD; // 標記此模型是否為 MMD
      S.bonesF = buildBoneMap(model);
      console.log("🕵️ 女模型的骨頭有這些：", Object.keys(S.bonesF));
    }
    
    scene.add(model);
    setMode('glb');
  }, undefined, err => {
    const msg = (err && err.message) ? err.message : String(err);
    const isNotFound = msg.includes('404') || msg.includes('Failed to fetch') || msg.includes('NetworkError');
    if (isNotFound) {
      status(`找不到 <b>${typeof source==='string'?source:'GLB'}</b>，改用方塊人模式`);
    } else {
      status('GLB 載入失敗：' + msg);
    }
  });
}
// ═══════════════════════════════════════════════════════════════════════════
// SECTION 8 ─ WEB AUDIO BEAT ENGINE
// ═══════════════════════════════════════════════════════════════════════════
//
// 架構：
//   AudioContext
//     └─ MediaElementSource(audioEl)
//          └─ GainNode (音量)
//               └─ AnalyserNode (FFT 512點)
//                    └─ destination
//
// 節拍偵測邏輯：
//   1. 每幀讀取 analyser.getByteFrequencyData()
//   2. 計算 sub-bass (bins 0-5 ≈ 0-520Hz) 能量平均值
//   3. 當能量 > dynamicThreshold 且距上次節拍 > 200ms → 觸發 beatFlash()
//   4. dynamicThreshold 使用指數移動平均自動校準
//   5. 偵測到節拍時，將計數器對齊到最近的4幀邊界 (drift correction)
//
const audio = {
  ctx: null, src: null, gain: null, analyser: null,
  audioEl: null,
  enabled: true,
  lastBeatTime: 0,
  // Dynamic threshold — exponential moving average of energy
  emaEnergy: 0.05,
  emaAlpha: 0.02,         // slow-decay EMA (lower = more historical)
  thresholdMult: 1.45,    // trigger when energy > 1.45× EMA
  minBeatInterval: 220,   // ms cooldown between detected beats
  // Detected BPM tracking (rolling buffer of last 8 beat intervals)
  beatTimes: [],
  detectedBPM: BASE_BPM,
  // Spectrum canvas
  specCtx: document.getElementById('spec').getContext('2d'),
  specCanvas: document.getElementById('spec'),
  // Beat UI flash
  beatFlashTimer: null,
};

function initAudio(audioEl) {
  if (audio.ctx) return; // already initialised
  audio.audioEl = audioEl;
  const ctx = audio.ctx = new (window.AudioContext || window.webkitAudioContext)();
  audio.src = ctx.createMediaElementSource(audioEl);
  audio.gain = ctx.createGain();
  audio.gain.gain.value = 0.7;
  audio.analyser = ctx.createAnalyser();
  audio.analyser.fftSize = 512;
  audio.analyser.smoothingTimeConstant = 0.75;
  audio.src.connect(audio.gain);
  audio.gain.connect(audio.analyser);
  audio.analyser.connect(ctx.destination);
}

function beatFlash() {
  const dot = document.getElementById('beat-dot');
  dot.classList.add('on');
  clearTimeout(audio.beatFlashTimer);
  audio.beatFlashTimer = setTimeout(() => dot.classList.remove('on'), 80);

  // Stage light pulse with colour cycle
  pulseStageLights();
}

function tickAudioAnalysis() {
  if (!audio.analyser || !audio.enabled) return;

  const bufLen = audio.analyser.frequencyBinCount; // 256
  const data   = new Uint8Array(bufLen);
  audio.analyser.getByteFrequencyData(data);

  // ── Sub-bass energy (bins 0–5 ≈ 0–520Hz at 44100/512)
  let bassSum = 0;
  const BASS_BINS = 6;
  for (let i = 0; i < BASS_BINS; i++) bassSum += data[i];
  const bassEnergy = bassSum / (BASS_BINS * 255); // 0..1

  // ── Update dynamic threshold
  audio.emaEnergy = audio.emaAlpha * bassEnergy + (1 - audio.emaAlpha) * audio.emaEnergy;
  const threshold = audio.emaEnergy * audio.thresholdMult;

  // ── Beat detect
  const now = performance.now();
  if (bassEnergy > threshold && (now - audio.lastBeatTime) > audio.minBeatInterval) {
    audio.lastBeatTime = now;
    beatFlash();

    // Rolling BPM calculation from last 8 inter-beat intervals
    audio.beatTimes.push(now);
    if (audio.beatTimes.length > 9) audio.beatTimes.shift();
    if (audio.beatTimes.length >= 3) {
      const intervals = [];
      for (let i = 1; i < audio.beatTimes.length; i++)
        intervals.push(audio.beatTimes[i] - audio.beatTimes[i-1]);
      const avgInterval = intervals.reduce((a,b)=>a+b) / intervals.length;
      const bpm = 60000 / avgInterval;
      // Sanity check: only accept 90–180 BPM
      if (bpm >= 90 && bpm <= 180) {
        audio.detectedBPM = bpm;
        document.getElementById('bpm-val').textContent = Math.round(bpm);
        // Sync animation speed: frameInterval = 60000/(BPM*4)
        // Only adjust if we're within ±20% of base
        const targetFrameMs = 60000 / (bpm * BEAT_EVERY);
        if (Math.abs(targetFrameMs - BASE_FRAME_MS) < BASE_FRAME_MS * 0.2) {
          _computedInterval = targetFrameMs / S.speedMult;
        }
      }
    }

    // ── Drift correction: snap counter to nearest beat boundary (multiple of 4)
    const beatBoundary = Math.round(S.counter / BEAT_EVERY) * BEAT_EVERY;
    if (Math.abs(S.counter - beatBoundary) <= 1) S.counter = beatBoundary;
  }

  // ── Beat bar (progress within current beat)
  const beatPos = ((now - audio.lastBeatTime) / (60000 / audio.detectedBPM)) % 1;
  document.getElementById('beat-bar').style.width = (beatPos * 100) + '%';

  // ── Spectrum visualiser (mini, 5 bars)
  drawSpectrum(data);
}

function drawSpectrum(data) {
  const cv = audio.specCanvas;
  const ctx = audio.specCtx;
  cv.width = cv.clientWidth * window.devicePixelRatio;
  cv.height = cv.clientHeight * window.devicePixelRatio;
  ctx.clearRect(0, 0, cv.width, cv.height);

  const BANDS = 32;
  const W = cv.width, H = cv.height;
  const barW = W / BANDS - 1;
  for (let i = 0; i < BANDS; i++) {
    const idx = Math.floor(i * data.length / BANDS);
    const v = data[idx] / 255;
    // colour gradient: bass=green, mid=cyan, high=blue
    const hue = 150 - i * 3;
    ctx.fillStyle = `hsla(${hue},80%,55%,0.85)`;
    const bh = v * H;
    ctx.fillRect(i * (barW + 1), H - bh, barW, bh);
  }
}

// computed interval in ms (updated by beat detection)
let _computedInterval = BASE_FRAME_MS;

// ═══════════════════════════════════════════════════════════════════════════
// SECTION 9 ─ ANIMATION LOOP (showMovie + ColorChange)
// ═══════════════════════════════════════════════════════════════════════════
function showMovie(idx) {
  const Mrow = Mbuffer[idx], Frow = Fbuffer[idx];
  if (!Mrow || !Frow) return;

  // 使用明確索引，確保讀取位置絕對精確
  // 身體位移與旋轉 (0-5)
  for (let j = 0; j < 3; j++) { S.MBadyT[j] = Mrow[j];   S.FBadyT[j] = Frow[j]; }
  for (let j = 0; j < 3; j++) { S.MBadyR[j] = Mrow[j+3]; S.FBadyR[j] = Frow[j+3]; }

  // 手臂與腿部 (6-29)
  // 計算方式：起始位置 + 對應索引
  for (let j = 0; j < 3; j++) { S.MRUHand[j] = Mrow[j+6];  S.FRUHand[j] = Frow[j+6]; }
  for (let j = 0; j < 3; j++) { S.MRDHand[j] = Mrow[j+9];  S.FRDHand[j] = Frow[j+9]; }
  for (let j = 0; j < 3; j++) { S.MLUHand[j] = Mrow[j+12]; S.FLUHand[j] = Frow[j+12]; }
  for (let j = 0; j < 3; j++) { S.MLDHand[j] = Mrow[j+15]; S.FLDHand[j] = Frow[j+15]; }
  for (let j = 0; j < 3; j++) { S.MRULeg[j]  = Mrow[j+18]; S.FRULeg[j]  = Frow[j+18]; }
  for (let j = 0; j < 3; j++) { S.MRDLeg[j]  = Mrow[j+21]; S.FRDLeg[j]  = Frow[j+21]; }
  for (let j = 0; j < 3; j++) { S.MLULeg[j]  = Mrow[j+24]; S.FLULeg[j]  = Frow[j+24]; }
  for (let j = 0; j < 3; j++) { S.MLDLeg[j]  = Mrow[j+27]; S.FLDLeg[j]  = Frow[j+27]; }

  // 腳掌 (30-31)
  S.MRBLeg = Mrow[30]; S.FRBLeg = Frow[30];
  S.MLBLeg = Mrow[31]; S.FLBLeg = Frow[31];
}

function colorChange(mode) {
  if (mode === 0) {
    if (S.colorflag===1) { S.Red=S.Green=S.Blue=0.02; S.colorflag=0; }
    S.Red=S.Green=S.Blue = (S.Red < 0.01) ? 0.02 : 0;
  } else {
    if (S.colorflag===0) { S.Red=0; S.Green=0.03; S.Blue=0.08; S.colorflag=1; }
    S.Red=(S.Red+0.25)%1;
    S.Green=(S.Green+0.18)%1;
    S.Blue=(S.Blue+0.09)%1;
  }
  scene.background.setRGB(S.Red*0.12, S.Green*0.12, S.Blue*0.12);
  scene.fog.color.copy(scene.background);
}

function scheduleNext() {
  S.timerId = setTimeout(tick, _computedInterval / S.speedMult);
}

function tick() {
  if (!S.playing) return;
  if (S.counter < TOTAL) {
    showMovie(S.counter);
    const isCurrentlyMMD = S.mode === 'glb' && (
      (S.glbM && S.glbM.isMMD) || 
      (S.glbF && S.glbF.isMMD)
    );
    if (isCurrentlyMMD) {
    } else {
      if (S.counter < 229) { colorChange(0); }
      else {
        colorChange(1);
        S.Look = (S.Look + 0.03925) % (Math.PI*2);
        const rel = (S.counter-228) % 32;
        if (rel===16 || rel===0) S.zoom = S.zoom===0?1:0;
      }
    }
    S.counter++;
    scheduleNext();
  } else {
    S.playing=false; S.counter=0; S.Look=Math.PI*1.5; S.zoom=0;
    showMovie(0);
    status('播放完畢 — 按 <b>Space</b> 重播');
    if (S.audioEl) S.audioEl.pause();
  }
}

function togglePlayback() {
  // 檢查目前是否有上傳的音樂
  const hasUploadedAudio = (typeof MP !== 'undefined' && MP.audioBuffer);

  if (S.playing) {
    // ════════════ 暫停邏輯 ════════════
    S.playing = false;
    if (S.timerId) { clearTimeout(S.timerId); S.timerId = null; }
    
    // 1. 音訊暫停
    if (S.audioEl) S.audioEl.pause();
    
    // 2. 上傳 MP 音訊暫停 (SECTION 13)
    if (typeof MP !== 'undefined' && MP.playing) {
      stopAudio(); // 呼叫 SECTION 13 暫停功能
    }

    // 3. 修正：男模型 MMD 動畫暫停
    if (S.glbM && S.glbM.isMMD && danceActionM) {
      console.log('暫停男模型 MMD 動畫');
      danceActionM.paused = true;
    }
    
    // 4. 修正：女模型 MMD 動畫暫停
    if (S.glbF && S.glbF.isMMD && danceActionF) {
      console.log('暫停女模型 MMD 動畫');
      danceActionF.paused = true;
    }

    status(`暫停於 Frame <b>${S.counter}</b> / ${TOTAL}`);
    if (hasUploadedAudio) musicStatus('⏸ 已暫停');

  } else {
    // ════════════ 播放邏輯 ════════════
    if (S.counter >= TOTAL) { S.counter = 0; S.Look = Math.PI * 1.5; S.zoom = 0; showMovie(0); }
    S.playing = true;

    // 1. 修正：男模型 MMD 動畫繼續
    if (S.glbM && S.glbM.isMMD && danceActionM) {
      console.log('繼續男模型 MMD 動畫');
      danceActionM.paused = false;
    }
    
    // 2. 修正：女模型 MMD 動畫繼續
    if (S.glbF && S.glbF.isMMD && danceActionF) {
      console.log('繼續女模型 MMD 動畫');
      danceActionF.paused = false;
    }

    // 3. 音訊播放
    if (hasUploadedAudio) {
      // 如果有上傳音樂，確保預設的 dance.wav 絕對保持靜音和暫停
      if (S.audioEl) { S.audioEl.pause(); S.audioEl.volume = 0; }
      
      if (MP.audioCtx && MP.audioCtx.state === 'suspended') MP.audioCtx.resume();
      if (!MP.playing) startAudio(MP.pauseOffset || 0);
      
      const name = document.getElementById('track-name').textContent || '音樂';
      status(`<b>${name}</b> &middot; &#127925; 播放中`);
    } else {
      if (S.audioEl) {
        if (!audio.ctx) initAudio(S.audioEl);
        else if (audio.ctx.state === 'suspended') audio.ctx.resume();
        S.audioEl.play().catch(() => {});
      }
    }
    
    // // 4. 上傳 MP 音訊播放 (與 syncAndDance 邏輯對接)
    // if (typeof MP !== 'undefined' && MP.audioBuffer && !MP.playing) {
    //   if (MP.audioCtx && MP.audioCtx.state === 'suspended') MP.audioCtx.resume();
    //   startAudio(MP.pauseOffset || 0); // 呼叫 SECTION 13 的播放
    // }

    scheduleNext();
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// SECTION 10 ─ THREE.JS RENDER LOOP
// ═══════════════════════════════════════════════════════════════════════════
// 宣告一個 clock 用於計算 MMD 動畫時間流逝
const clock = new THREE.Clock();

renderer.setAnimationLoop(() => {
  // Camera — OrbitControls 處理滑鼠互動
  if (S.counter > 512) {
    // ════ 舞跳完了：啟動自動回正 ════
    // 強制將鏡頭高度與焦點拉回標準全身視野（避免卡在特寫）
    r = 50; ey = 20; cy = 8; 

    // 讓 S.Look 透過線性插值（Lerp）緩慢、平滑地逼近正面角度 (Math.PI * 1.5)
    const targetLook = Math.PI * 2; 
    
    // 每次 Loop 縮短 5% 的角度差距，產生減速效果
    S.Look += (targetLook - S.Look) * 0.05; 
    
    // 設定相機位置與焦點
    camera.position.set(r * Math.cos(S.Look), ey, r * Math.sin(S.Look));
    controls.target.set(0, cy, 0);
  } else {
    // 動畫播放到第 228 幀後進入轉場：恢復原版旋轉 + 縮放效果
    if (S.playing && S.counter > 228) {
        const r  = S.zoom === 0 ? 50 : 35;
        const ey = S.zoom === 0 ? 20 : 10;
        const cy = S.zoom === 0 ?  8 : 14;
        // 直接設定相機位置（覆蓋 OrbitControls）
        camera.position.set(
        r * Math.cos(S.Look),
        ey,
        r * Math.sin(S.Look)
        );
        controls.target.set(0, cy, 0);
    }
  }
  controls.update(); // damping 必須每幀呼叫

  // Visibility
  manBox.root.visible  = S.mode==='box';
  womanBox.root.visible = S.mode==='box';
  if (S.glbM) S.glbM.visible  = S.mode==='glb';
  if (S.glbF) S.glbF.visible  = S.mode==='glb';

  // 根據模型種類，分流控制動作驅動
  if (S.mode === 'box') {
    applyBoxAngles();
  } else if (S.mode === 'glb') {
    
    // 獲取兩格 Frame 之間的時間差 (MMD 播放必備)
    const delta = clock.getDelta();

    // 【男模型分流】
    if (S.glbM) {
      if (S.glbM.isMMD) {
        // 如果名稱帶 mmd：用自帶的 mixer 更新動畫
        if (S.playing && window.mixerM) {
          window.mixerM.update(delta);
        }
      } else {
        // 如果不帶 mmd：走原本的邏輯，接收方塊人的角度
        applyGLBAngles(S.glbM, S.bonesM, 'M');
      }
    }

    // 【女模型分流】
    if (S.glbF) {
      if (S.glbF.isMMD) {
        // 如果名稱帶 mmd：用自帶的 mixer 更新動畫
        if (S.playing && window.mixerF) {
          window.mixerF.update(delta);
        }
      } else {
        // 如果不帶 mmd：走原本的邏輯，接收方塊人的角度
        applyGLBAngles(S.glbF, S.bonesF, 'F');
      }
    }
  }

  // Audio analysis (every frame for smooth spectrum)
  if (S.playing) tickAudioAnalysis();

  updateDryIce();

  renderer.render(scene, camera);
});

// ── Load & decode
async function loadAudioFile(file){
  musicStatus('讀取中…');
  document.getElementById('track-name').textContent=file.name.replace(/\.[^.]+$/,'');
  document.getElementById('track-sub').textContent=(file.size/1024/1024).toFixed(1)+' MB';
  document.getElementById('track-info').classList.add('visible');
  document.getElementById('bpm-big').textContent='…';
  document.getElementById('bpm-confidence').textContent='分析中';
  document.getElementById('btn-play-audio').disabled=true;
  document.getElementById('btn-sync-mp').disabled=true;
  showABar(0);
  if(!MP.audioCtx){
    MP.audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    MP.gainNode=MP.audioCtx.createGain();
    MP.gainNode.gain.value=0.85;
    MP.gainNode.connect(MP.audioCtx.destination);
  }
  if(MP.audioCtx.state==='suspended') await MP.audioCtx.resume();
  stopAudio();
  try{
    const ab=await file.arrayBuffer();
    showABar(20); musicStatus('解碼音訊…');
    MP.audioBuffer=await MP.audioCtx.decodeAudioData(ab);
    showABar(50); musicStatus('分析 BPM…');
    drawWaveform(MP.audioBuffer);
    const bpm=await analyseBpm(MP.audioBuffer, p=>showABar(50+p*50));
    showABar(100); setTimeout(hideABar,600);
    MP.detectedBpm=bpm;
    document.getElementById('bpm-big').textContent=Math.round(bpm);
    document.getElementById('bpm-confidence').textContent='自動分析完成';
    document.getElementById('bpm-manual').value=Math.round(bpm);
    // Sync to dance engine
    audio.detectedBPM=bpm;
    _computedInterval=(60000/(bpm*BEAT_EVERY))/S.speedMult;
    document.getElementById('bpm-val').textContent=Math.round(bpm);
    document.getElementById('btn-play-audio').disabled=false;
    document.getElementById('btn-sync-mp').disabled=false;
    musicStatus('<b>'+Math.round(bpm)+' BPM</b> · 按「同步跳舞」開始');
  }catch(e){ hideABar(); musicStatus('❌ '+e.message); }
}

// ── Offline BPM analysis
async function analyseBpm(buffer, onProg){
  const srcRate=buffer.sampleRate;
  const FACTOR=Math.max(1,Math.floor(srcRate/11025));
  const ch0=buffer.getChannelData(0);
  const ch1=buffer.numberOfChannels>1?buffer.getChannelData(1):ch0;
  const len=Math.floor(ch0.length/FACTOR);
  const mono=new Float32Array(len);
  for(let i=0;i<len;i++){
    let s=0;
    for(let j=0;j<FACTOR;j++) s+=(ch0[i*FACTOR+j]+ch1[i*FACTOR+j])*0.5;
    mono[i]=s/FACTOR;
  }
  const FRAME=512,HOP=256;
  const nF=Math.floor((mono.length-FRAME)/HOP);
  const energy=new Float32Array(nF);
  for(let i=0;i<nF;i++){
    let s=0,o=i*HOP;
    for(let j=0;j<FRAME;j++) s+=mono[o+j]**2;
    energy[i]=Math.sqrt(s/FRAME);
  }
  onProg&&onProg(0.3); await new Promise(r=>setTimeout(r,0));
  let mx=0;
  for(let i=1;i<energy.length-1;i++){const d=energy[i]-energy[i-1];if(d>mx)mx=d;}
  const thr=mx*0.12;
  const onsets=[]; let last=-999;
  for(let i=1;i<energy.length-1;i++){
    const d=energy[i]-energy[i-1];
    if(d>thr&&d>energy[i+1]-energy[i]&&(i-last)>5){onsets.push(i);last=i;}
  }
  onProg&&onProg(0.6); await new Promise(r=>setTimeout(r,0));
  if(onsets.length<4) return 120;
  const dsRate=srcRate/FACTOR;
  const fRate=dsRate/HOP;
  const hist={};
  for(let i=1;i<onsets.length;i++){
    const dt=(onsets[i]-onsets[i-1])/fRate;
    if(dt<0.2||dt>2.5) continue;
    for(const m of [1,2,0.5]){
      const b=Math.round(60/(dt*m));
      if(b<60||b>200) continue;
      const bin=Math.round(b/2)*2;
      hist[bin]=(hist[bin]||0)+1;
    }
  }
  onProg&&onProg(0.9);
  const cands=Object.entries(hist).filter(([b])=>+b>=90&&+b<=160).sort((a,b)=>b[1]-a[1]);
  return cands.length ? +cands[0][0] : 120;
}

// ── Waveform
function drawWaveform(buf){
  const cv=document.getElementById('waveform');
  const W=cv.parentElement.clientWidth*window.devicePixelRatio;
  const H=48*window.devicePixelRatio;
  cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  const data=buf.getChannelData(0);
  const step=Math.floor(data.length/W)||1;
  ctx.strokeStyle='rgba(125,249,170,0.6)'; ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=0;x<W;x++){
    let mn=0,mx=0;
    for(let j=0;j<step;j++){const v=data[x*step+j]||0;if(v<mn)mn=v;if(v>mx)mx=v;}
    ctx.moveTo(x,((1-mx)/2)*H); ctx.lineTo(x,((1-mn)/2)*H);
  }
  ctx.stroke();
}

// ── Transport
function startAudio(offset){
  if(!MP.audioBuffer) return;
  try{MP.sourceNode&&MP.sourceNode.disconnect();}catch{}
  MP.sourceNode=MP.audioCtx.createBufferSource();
  MP.sourceNode.buffer=MP.audioBuffer;
  MP.sourceNode.connect(MP.gainNode);
  MP.sourceNode.start(0,offset||0);
  MP.startTime=MP.audioCtx.currentTime-(offset||0);
  MP.pauseOffset=0; MP.playing=true;
  document.getElementById('btn-play-audio').textContent='⏸ 暫停';
  requestAnimationFrame(updateProgress);
  beatLoop();
  MP.sourceNode.onended=()=>{ if(MP.playing) stopAudio(); };
}
function stopAudio(){
  if(MP.sourceNode){
    try{MP.pauseOffset=MP.audioCtx.currentTime-MP.startTime;MP.sourceNode.stop();MP.sourceNode.disconnect();}catch{}
    MP.sourceNode=null;
  }
  MP.playing=false;
  document.getElementById('btn-play-audio').textContent='▶ 播放';
  clearTimeout(MP.beatTimerId);
}
function toggleAudio(){
  if(!MP.audioBuffer) return;
  if(MP.audioCtx.state==='suspended') MP.audioCtx.resume();
  MP.playing ? stopAudio() : startAudio(MP.pauseOffset||0);
}
window.toggleAudio=toggleAudio;

function seekAudio(e){
  if(!MP.audioBuffer) return;
  const rect=e.currentTarget.getBoundingClientRect();
  const off=(e.clientX-rect.left)/rect.width*MP.audioBuffer.duration;
  if(MP.playing){stopAudio();startAudio(off);}
  else{MP.pauseOffset=off;document.getElementById('progress-bar').style.width=((off/MP.audioBuffer.duration)*100)+'%';}
}
window.seekAudio=seekAudio;

function updateProgress(){
  if(!MP.playing||!MP.audioBuffer) return;
  const pct=Math.min((MP.audioCtx.currentTime-MP.startTime)/MP.audioBuffer.duration,1);
  document.getElementById('progress-bar').style.width=(pct*100)+'%';
  if(pct<1) requestAnimationFrame(updateProgress);
}

// ── Beat flash
function beatLoop(){
  if(!MP.playing) return;
  ['beat-dot-mp','beat-dot'].forEach(id=>{
    const d=document.getElementById(id);
    if(!d) return;
    d.classList.add('on'); setTimeout(()=>d.classList.remove('on'),80);
  });
  pulseStageLights();
  const bpm=MP.detectedBpm||audio.detectedBPM||120;
  MP.beatTimerId=setTimeout(beatLoop,60000/bpm);
}

// ── Manual BPM
function applyManualBpm(){
  const v=+document.getElementById('bpm-manual').value;
  if(!v||v<40||v>250){musicStatus('⚠️ BPM 請填 40–250');return;}
  MP.detectedBpm=v; audio.detectedBPM=v;

}

// ── Analyse bar
function showABar(p){document.getElementById('analyse-bar').classList.add('visible');document.getElementById('analyse-fill').style.width=p+'%';}
function hideABar(){document.getElementById('analyse-bar').classList.remove('visible');}

// ── Sync & Dance
function syncAndDance(){
  const bpm=MP.detectedBpm||audio.detectedBPM;
  if(!bpm){musicStatus('⚠️ 請先上傳音樂');return;}

  audio.detectedBPM=bpm;
  _computedInterval=(60000/(bpm*BEAT_EVERY))/S.speedMult;
  document.getElementById('bpm-val').textContent=Math.round(bpm);

  const name=document.getElementById('track-name').textContent||'音樂';

  // ── Beat-aligned sync ──────────────────────────────────────────
  // If audio is already playing, calculate which animation frame
  // we should currently be on based on elapsed audio time,
  // then snap to nearest beat boundary and keep going.
  // If audio is not playing, start from frame 0.
  // ──────────────────────────────────────────────────────────────
  if(MP.playing && MP.audioBuffer){
    const elapsed   = MP.audioCtx.currentTime - MP.startTime; // seconds into song
    const frameMs   = _computedInterval;                       // ms per anim frame
    const rawFrame  = (elapsed * 1000) / frameMs;              // float frame index
    // Snap to nearest beat boundary (multiple of BEAT_EVERY=4)
    const beatBound = Math.round(rawFrame / BEAT_EVERY) * BEAT_EVERY;
    S.counter = ((beatBound % TOTAL) + TOTAL) % TOTAL;
    showMovie(S.counter);
    // Restart scheduler from this position
    if(S.timerId) clearTimeout(S.timerId);
    S.playing=true; scheduleNext();
    status('<b>'+name+'</b> &middot; '+Math.round(bpm)+' BPM &middot; &#127925; 對拍同步中');
    musicStatus('對拍同步 &middot; '+Math.round(bpm)+' BPM');
  } else {
    // Audio not playing — start everything from 0
    stopAudio();
    if(MP.audioCtx.state==='suspended') MP.audioCtx.resume();
    startAudio(0);
    if(S.timerId) clearTimeout(S.timerId);
    S.playing=false; S.counter=0; S.Look=Math.PI*0.5; S.zoom=0;
    showMovie(0); S.playing=true; scheduleNext();
    status('<b>'+name+'</b> &middot; '+Math.round(bpm)+' BPM &middot; &#127925; 跳舞中');
    musicStatus('同步中 &middot; '+Math.round(bpm)+' BPM');
  }
}
window.syncAndDance=syncAndDance;

// ═══════════════════════════════════════════════════════════════════════════
// SECTION 14 — DRY ICE PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════════════════════
let iceParticles = null;
const particleCount = 500; // 乾冰粒子數量，可依效能調整
const particleGeometry = new THREE.BufferGeometry();

// 建立粒子所需的數據陣列
const positions = new Float32Array(particleCount * 3);
const velocities = [];
const selfRotations = [];

function initDryIce() {
  // 1. 產生煙霧的圓形漸層貼圖 (用 Canvas 動態畫一個，免去外部載入圖片的麻煩)
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  gradient.addColorStop(0, 'rgba(255, 255, 255, 0.25)'); // 中心白，半透明
  gradient.addColorStop(0.5, 'rgba(240, 240, 255, 0.08)');
  gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');    // 邊緣完全透明
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 64, 64);
  const texture = new THREE.CanvasTexture(canvas);
    
  // 2. 初始化粒子位置與速度
  for (let i = 0; i < particleCount; i++) {
    // 用極坐標生成圓形分佈
    const radius = Math.random() * 30;        // 最大半徑為 30 的圓
    const angle = Math.random() * Math.PI * 2; // 0 到 360 度隨機角度

    positions[i * 3] = radius * Math.cos(angle);     // X = r * cos(θ)
    positions[i * 3 + 1] = (Math.random() * 0.3 - 0.2) + 2.5; // Y (維持你的舞台高度)
    positions[i * 3 + 2] = radius * Math.sin(angle);     // Z = r * sin(θ)

    // 設定每個粒子的移動速度 (隨機向外流動、輕微上下漂浮)
    velocities.push({
      x: (Math.random() - 0.05) * 0.002,
      y: (Math.random() - 0.05) * 0.0005,
      z: (Math.random() - 0.05) * 0.002
    });

    // 隨機旋轉速度（讓煙霧看起來有攪動感）
    selfRotations.push((Math.random() - 0.05) * 0.01);
  }

  particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  // 3. 粒子材質球設定 (核心：關閉 depthWrite 防止半透明方塊破面)
  const particleMaterial = new THREE.PointsMaterial({
    size: 16,                 // 煙霧粒子的尺寸，越大煙越濃
    map: texture,
    transparent: true,
    blending: THREE.NormalBlending, 
    depthWrite: false,       // 半透明重疊時不寫入深度，才不會有方形切邊
    opacity: 0.9
  });

  // 4. 建立 Points 物件並加入場景
  iceParticles = new THREE.Points(particleGeometry, particleMaterial);
  scene.add(iceParticles);
}

function updateDryIce() {
  if (!iceParticles) return;

  const positionsAttr = particleGeometry.attributes.position;
  
  for (let i = 0; i < particleCount; i++) {
    // 讀取當前坐標
    let x = positionsAttr.getX(i);
    let y = positionsAttr.getY(i);
    let z = positionsAttr.getZ(i);

    // 加上速度位移
    x += velocities[i].x;
    y += velocities[i].y;
    z += velocities[i].z;

    // 邊界檢查：如果煙霧飄得太遠或太高，重新在中央地面生成
    if (Math.abs(x) > 35 || Math.abs(z) > 35 || y > 4.5 || y < 1.2) {
      const spawnRadius = Math.random() * 25; 
      const spawnAngle = Math.random() * Math.PI * 2;

      x = spawnRadius * Math.cos(spawnAngle);
      z = spawnRadius * Math.sin(spawnAngle);
      y = (Math.random() * 0.3 - 0.2) + 5; // 維持你的舞台高度
      
      // 讓重生的粒子速度擁有向外輻射發散的趨勢（看起來更像乾冰蔓延）
      const speedMag = 0.01 + Math.random() * 0.01;
      velocities[i].x = Math.cos(spawnAngle) * speedMag * 0.5 + (Math.random() - 0.5) * 0.005;
      velocities[i].y = (Math.random() - 0.5) * 0.003;
      velocities[i].z = Math.sin(spawnAngle) * speedMag * 0.5 + (Math.random() - 0.5) * 0.005;
    }

    // 寫回坐標
    positionsAttr.setXYZ(i, x, y, z);
  }

  // 告訴 Three.js 頂點位置已經被修改，需要更新渲染
  positionsAttr.needsUpdate = true;
  
  // 讓整片粒子群有輕微的整體旋轉，增加流動感
  iceParticles.rotation.y += 0.0005;
}

initDryIce();

</script>

  <div class="mp-sub">mp3 / wav / ogg &middot; 自動分析 BPM &middot; 節拍同步舞蹈</div>

  <div id="audio-drop" onclick="pickAudio()"
       ondragover="event.preventDefault();this.classList.add('drag-over')"
       ondragleave="this.classList.remove('drag-over')"
       ondrop="handleAudioDrop(event)">
    <span class="drop-icon">&#127925;</span>
    <div class="drop-text">點擊選擇音樂檔案</div>
    <div class="drop-hint">或拖曳 mp3 / wav / ogg 到此處</div>
  </div>

  <div id="track-info">
    <div id="track-name">—</div>
    <div id="track-sub">—</div>
    <div id="analyse-bar"><div id="analyse-fill"></div></div>
    <div id="bpm-display">
      <div id="bpm-big">—</div>
      <div id="bpm-right">
        <div id="bpm-label-mp">BPM（自動分析）</div>
        <div id="bpm-confidence">—</div>
      </div>
      <div id="beat-dot-mp"></div>
    </div>
    <div id="waveform-wrap" onclick="seekAudio(event)">
      <canvas id="waveform"></canvas>
      <div id="progress-bar"></div>
    </div>
    <div id="transport">
      <button id="btn-play-audio" onclick="toggleAudio()" disabled>&#9654; 播放</button>
      <button id="btn-sync-mp"    onclick="syncAndDance()" disabled>&#9670; 同步跳舞</button>
    </div>
    <div id="bpm-row-mp">
      <label>手動 BPM</label>
      <input id="bpm-manual" type="number" min="40" max="250" placeholder="128"/>
      <button id="bpm-apply" onclick="applyManualBpm()">套用</button>
      <a href="https://tunebat.com" target="_blank" class="tunebat-link">Tunebat &#8599;</a>
    </div>
  </div>

  <div id="music-status">上傳音樂檔開始使用</div>
</div>

</body>
</html>
